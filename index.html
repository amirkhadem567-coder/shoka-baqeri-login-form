<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Form</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <div class="container">

        <div class="logo">

            <img src="logo.png" alt="logo">

        </div>

        <h1>به سامانه آموزشیار خوش آمدید</h1>

        <div class="input-box">

            <input type="text" placeholder="شماره دانشجویی">

            <i class="fa-regular fa-user"></i>

        </div>

        <div class="input-box">

            <input type="password" placeholder="رمز عبور">

            <i class="fa-solid fa-key"></i>

        </div>

        <div class="captcha">

            <div class="check">

                <div class="square"></div>

                <span>I am human</span>

            </div>

            <div class="hcaptcha">

                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/HCaptcha_logo.svg/512px-HCaptcha_logo.svg.png">

                <p>hCaptcha</p>

            </div>

        </div>

        <div class="method">

            <h3>ارسال کد یکبار مصرف از طریق:</h3>

            <div class="options">

                <div class="option">

                    <div class="radio"></div>

                    <span>پیامک</span>

                    <i class="fa-regular fa-message"></i>

                </div>

                <div class="option">

                    <div class="radio active"></div>

                    <span>آیگپ</span>

                </div>

            </div>

        </div>

        <button class="btn primary">

            دریافت کد یکبار مصرف

        </button>

        <button class="btn secondary">

            فراموشی رمز عبور

        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
